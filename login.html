<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frigo IA — Connexion</title>
  <script src="https://accounts.google.com/gsi/client" onload="initGoogle()" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bodoni Moda"', 'Georgia', 'serif'],
            sans: ['Jost', 'system-ui', 'sans-serif'],
          },
          colors: {
            brand: { red: '#6366F1', light: 'rgba(99,102,241,0.13)', bg: '#0C0C10', text: '#EDE9E3', muted: '#6E6A65' }
          }
        }
      }
    }
  </script>

  <style>
    :root { color-scheme: dark; }
    body { font-family: 'Jost', system-ui, sans-serif; background: #0C0C10; color: #EDE9E3; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.09); box-shadow: 0 8px 40px rgba(0,0,0,0.6); }

    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.5s cubic-bezier(.16,1,.3,1) both; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #EDE9E3;
      font-size: 15px;
      font-family: 'Jost', sans-serif;
      transition: all 0.2s;
      outline: none;
    }
    .input-field:focus {
      border-color: #6366F1;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.15);
    }
    .input-field::placeholder { color: rgba(255,255,255,0.2); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      background: #6366F1;
      color: white;
      font-weight: 600;
      font-size: 15px;
      font-family: 'Jost', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover:not(:disabled) { background: #4F46E5; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(99,102,241,0.35); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">

  <!-- Décor de fond -->
  <div class="orb w-96 h-96 bg-red-300 -top-32 -right-32"></div>
  <div class="orb w-80 h-80 bg-orange-200 -bottom-24 -left-24"></div>
  <div class="orb w-64 h-64 bg-rose-200 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>

  <div class="w-full max-w-sm relative z-10 fade-up">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-brand-red flex items-center justify-center mb-4 shadow-lg shadow-red-200">
        <svg class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/>
        </svg>
      </div>
      <h1 class="font-display text-3xl font-bold text-brand-text">Frigo IA</h1>
      <p class="text-brand-muted text-sm font-light mt-1">Connecte-toi pour accéder à ton frigo</p>
    </div>

    <!-- Card -->
    <div class="glass rounded-3xl p-8">

      <form id="login-form" onsubmit="handleLogin(event)" class="flex flex-col gap-4">

        <!-- Identifiant -->
        <div>
          <label class="block text-xs font-medium text-brand-muted mb-2 uppercase tracking-wider">Identifiant</label>
          <div class="relative">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input id="username" type="text" placeholder="admin" autocomplete="username"
              class="input-field" style="padding-left:44px" required />
          </div>
        </div>

        <!-- Mot de passe -->
        <div>
          <label class="block text-xs font-medium text-brand-muted mb-2 uppercase tracking-wider">Mot de passe</label>
          <div class="relative">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
              class="input-field" style="padding-left:44px;padding-right:48px" required />
            <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-stone-300 hover:text-brand-muted transition-colors cursor-pointer rounded-lg">
              <svg id="eye-icon" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <!-- Erreur -->
        <div id="error-msg" class="hidden bg-red-50 border border-red-100 rounded-xl px-4 py-3 flex items-center gap-2">
          <svg class="w-4 h-4 text-brand-red flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p id="error-text" class="text-sm text-brand-red font-medium"></p>
        </div>

        <!-- Bouton -->
        <button type="submit" id="submit-btn" class="btn-primary mt-2">
          <span id="btn-label">Se connecter</span>
        </button>

      </form>

      <!-- Séparateur -->
      <div id="google-section" class="hidden">
        <div class="flex items-center gap-3 my-5">
          <div class="flex-1 h-px bg-stone-200"></div>
          <span class="text-xs text-stone-400 font-medium uppercase tracking-wider">ou</span>
          <div class="flex-1 h-px bg-stone-200"></div>
        </div>

        <!-- Bouton Google (rendu par GIS) -->
        <div id="google-btn-container" class="flex justify-center"></div>
      </div>

    </div>

    <p class="text-center text-xs text-stone-400 font-light mt-6">Frigo IA · Application personnelle</p>
  </div>

  <script>
    // ── Remplace par ton Client ID Google ──
    const GOOGLE_CLIENT_ID = '645289923674-kk540ka7h2hfkhq5ue7bkvet0se1qroq.apps.googleusercontent.com';

    // Redirige si déjà connecté
    if (localStorage.getItem('frigo_token')) {
      window.location.href = 'dashboard.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn   = document.getElementById('submit-btn');
      const label = document.getElementById('btn-label');
      const errEl = document.getElementById('error-msg');
      const errTx = document.getElementById('error-text');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      label.innerHTML = `<svg class="w-4 h-4 spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Connexion…`;
      errEl.classList.add('hidden');

      try {
        const res  = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('frigo_token', data.token);
          localStorage.setItem('frigo_user',  username);
          label.innerHTML = `<svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> Connecté !`;
          btn.style.background = '#16A34A';
          setTimeout(() => window.location.href = 'dashboard.html', 500);
        } else {
          throw new Error(data.error || 'Identifiants incorrects');
        }
      } catch (err) {
        errTx.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.disabled = false;
        label.textContent = 'Se connecter';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }

    // ── Google Sign-In ──
    function initGoogle() {
      if (!GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID === 'VOTRE_CLIENT_ID_GOOGLE') return;
      if (typeof google === 'undefined' || !google.accounts) return;

      document.getElementById('google-section').classList.remove('hidden');

      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleLogin,
        ux_mode: 'popup',
      });

      google.accounts.id.renderButton(
        document.getElementById('google-btn-container'),
        { theme: 'outline', size: 'large', shape: 'pill', locale: 'fr', width: 320, text: 'continue_with' }
      );
    }

    function handleGoogleLogin(response) {
      try {
        const parts   = response.credential.split('.');
        const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
        localStorage.setItem('frigo_token',   'google_' + Date.now());
        localStorage.setItem('frigo_user',    payload.name  || payload.email);
        localStorage.setItem('frigo_picture', payload.picture || '');
        localStorage.setItem('frigo_email',   payload.email || '');
        window.location.href = 'dashboard.html';
      } catch (e) {
        document.getElementById('error-text').textContent = 'Erreur Google : ' + e.message;
        document.getElementById('error-msg').classList.remove('hidden');
      }
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      icon.innerHTML = show
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }
  </script>

</body>
</html>
