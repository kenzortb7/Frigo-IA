<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frigo IA — Paiement réussi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { display: ['"Bodoni Moda"', 'serif'], sans: ['Jost', 'sans-serif'] }, colors: { brand: { red: '#6366F1', text: '#EDE9E3', muted: '#6E6A65', bg: '#0C0C10' } } } }
    }
  </script>
  <style>
    :root { color-scheme: dark; }
    body { font-family: 'Jost', sans-serif; background: #0C0C10; color: #EDE9E3; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.09); box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; z-index: 0; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.5s cubic-bezier(.16,1,.3,1) both; }
    @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
    .pop { animation: pop 0.6s cubic-bezier(.16,1,.3,1) 0.2s both; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">

  <div class="orb w-96 h-96 bg-indigo-500 -top-32 -right-32"></div>
  <div class="orb w-80 h-80 bg-violet-700 -bottom-24 -left-24"></div>

  <div class="w-full max-w-sm text-center fade-up relative z-10">
    <div class="glass rounded-3xl p-10">

      <!-- Icône succès -->
      <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 pop" style="background:rgba(110,231,183,0.15);border:2px solid rgba(110,231,183,0.3)">
        <svg class="w-10 h-10" style="color:#6EE7B7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>

      <h1 class="font-display text-3xl font-bold text-brand-text mb-2">Premium activé !</h1>
      <p class="font-light text-sm mb-1" style="color:#6EE7B7">Ton abonnement est confirmé.</p>
      <p id="status-msg" class="text-brand-muted font-light text-sm mb-8">Redirection vers ton frigo…</p>

      <div class="flex items-center justify-center gap-2 text-brand-muted text-sm">
        <svg class="w-4 h-4 spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <span>Chargement…</span>
      </div>
    </div>
  </div>

  <script>
    (async () => {
      const params    = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');

      // Activer le plan premium immédiatement
      localStorage.setItem('frigo_subscribed', '1');

      if (sessionId) {
        try {
          const res  = await fetch(`/verify-payment?session_id=${sessionId}`);
          const data = await res.json();
          if (data.subscribed) {
            localStorage.setItem('frigo_subscribed', '1');
            if (data.email) localStorage.setItem('frigo_customer_email', data.email);
          }
        } catch (e) { /* silence — on redirige quand même */ }
      }

      // Redirection vers le dashboard après 1.5s
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
    })();
  </script>

</body>
</html>
